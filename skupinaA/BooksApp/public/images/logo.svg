<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo: Bibliotheca
  Barevná paleta:
    Indigo (primární):  #4338CA  (Tailwind: indigo-700)
    Indigo (tmavé):     #3730A3  (Tailwind: indigo-800)
    Indigo (světlé):    #A5B4FC  (Tailwind: indigo-300)
    Amber (akcent):     #F59E0B  (Tailwind: amber-500)
    Text (tmavý):       #1E293B  (Tailwind: slate-800)

  Průhledné pozadí – vhodné pro barevnou navigační lištu.
  Orientace horizontální (300 × 70 px).

  Pro úpravu otevřete v Inkscape.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70">

  <!-- Ikona otevřené knihy -->

  <!-- Levá strana knihy -->
  <rect x="5" y="9" width="30" height="52" rx="4" fill="#4338CA"/>
  <!-- Pravá strana knihy -->
  <rect x="44" y="9" width="22" height="52" rx="4" fill="#4338CA"/>
  <!-- Hřbet knihy -->
  <rect x="34" y="7" width="11" height="56" rx="2" fill="#3730A3"/>

  <!-- Řádky textu na levé straně -->
  <rect x="10" y="20" width="20" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="10" y="28" width="20" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="10" y="36" width="20" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="10" y="44" width="14" height="2" rx="1" fill="#A5B4FC"/>

  <!-- Řádky textu na pravé straně -->
  <rect x="48" y="20" width="14" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="48" y="28" width="14" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="48" y="36" width="14" height="2" rx="1" fill="#A5B4FC"/>
  <rect x="48" y="44" width="10" height="2" rx="1" fill="#A5B4FC"/>

  <!-- Záložka (amber akcent) -->
  <polygon points="34,7 45,7 45,30 39.5,23 34,30" fill="#F59E0B"/>

  <!-- Název aplikace -->
  <text x="82" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        font-weight="700">
    <tspan fill="#1E293B">Biblio</tspan><tspan fill="#F59E0B">theca</tspan>
  </text>

</svg>
